<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ราคาอะไหล่มือถือ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#16202b; --ink-soft:#5a6b7b; --line:#e4e9ee;
    --bg:#f6f8fa; --card:#ffffff;
    --accent:#0f8a7e; --accent-dark:#0b6b61; --accent-soft:#e3f4f1;
    --warn:#c2741b; --warn-soft:#fbeede;
    --shadow:0 1px 2px rgba(22,32,43,.06), 0 8px 24px rgba(22,32,43,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Noto Sans Thai','Bai Jamjuree',sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding-bottom:84px;
  }
  .ui{font-family:'Bai Jamjuree',sans-serif}
  /* header */
  header{
    color:#fff;padding:16px 18px;position:sticky;top:0;z-index:30;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:linear-gradient(135deg,#0f8a7e 0%,#0b6b61 45%,#16202b 100%);
    background-size:cover;background-position:center;position:relative;overflow:hidden;
  }
  header::after{content:"";position:absolute;inset:0;background:
    radial-gradient(circle at 80% -20%,rgba(95,214,198,.25),transparent 60%);pointer-events:none}
  header.has-cover{background-image:var(--cover)!important;background-blend-mode:normal}
  header.has-cover::before{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(11,30,30,.35),rgba(11,30,30,.75));pointer-events:none}
  .brand-wrap{display:flex;align-items:center;gap:12px;position:relative;z-index:2;min-width:0}
  .logo{width:46px;height:46px;border-radius:13px;object-fit:cover;background:#fff;
    box-shadow:0 4px 12px rgba(0,0,0,.25);flex-shrink:0;display:none}
  .brand{font-family:'Bai Jamjuree';font-weight:700;font-size:1.2rem;letter-spacing:.2px;text-shadow:0 1px 6px rgba(0,0,0,.3);min-width:0}
  .brand small{display:block;font-weight:400;font-size:.7rem;color:#e5f3f0;letter-spacing:.3px;margin-top:2px}
  .gear{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.1rem;cursor:pointer;
    padding:8px;line-height:0;border-radius:10px;position:relative;z-index:2;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  /* search */
  .hero{padding:18px 16px 4px;max-width:760px;margin:0 auto}
  .searchwrap{position:relative}
  .searchwrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-soft)}
  #search{
    width:100%;padding:14px 16px 14px 42px;font-size:1rem;
    font-family:'Noto Sans Thai';border:1.5px solid var(--line);border-radius:14px;
    background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s;
  }
  #search:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .pricenote{
    display:flex;align-items:center;gap:7px;margin:12px 2px 4px;
    font-size:.8rem;color:var(--warn);background:var(--warn-soft);
    padding:9px 12px;border-radius:10px;line-height:1.4;
  }
  /* chips */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:14px 16px 6px;max-width:760px;margin:0 auto;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    font-family:'Bai Jamjuree';font-weight:500;font-size:.86rem;white-space:nowrap;
    padding:8px 15px;border:1.5px solid var(--line);background:var(--card);
    border-radius:999px;color:var(--ink-soft);cursor:pointer;transition:.15s;
  }
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  /* list */
  .list{padding:8px 16px 24px;max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:9px}
  .cat-head{font-family:'Bai Jamjuree';font-weight:600;font-size:.78rem;color:var(--accent);
    text-transform:uppercase;letter-spacing:.8px;margin:14px 2px 2px}
  .cat-head.featured{color:#fff;background:linear-gradient(90deg,#c2741b,#e0922f);
    font-size:.9rem;letter-spacing:.5px;padding:9px 14px;border-radius:10px;
    text-transform:none;box-shadow:0 4px 12px rgba(194,116,27,.25);margin:18px 0 6px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
    gap:12px;box-shadow:var(--shadow);
  }
  .card .name{font-weight:500;font-size:.97rem;line-height:1.35}
  .card .sub{font-size:.78rem;color:var(--ink-soft);margin-top:2px}
  .price{font-family:'Bai Jamjuree';font-weight:700;font-size:1.12rem;color:var(--ink);white-space:nowrap}
  .price small{font-weight:500;font-size:.7rem;color:var(--ink-soft);display:block;text-align:right}
  .admin-actions{display:flex;gap:6px;margin-top:8px}
  .mini{font-family:'Bai Jamjuree';font-size:.74rem;padding:4px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink-soft)}
  .mini.del{color:#c0392b;border-color:#f2d0cc}
  .empty{text-align:center;color:var(--ink-soft);padding:48px 20px;font-size:.92rem}
  .empty b{display:block;font-family:'Bai Jamjuree';color:var(--ink);font-size:1rem;margin-bottom:4px}
  /* feed page header (Facebook style) */
  #feedView,#newsView{background:#f0f2f5;min-height:100vh;font-family:'Mali','Noto Sans Thai',sans-serif}
  #feedView .fb-name,#feedView .fb-caption,#feedView .fb-cap-first,#feedView .fb-actions button,
  #feedView .composer-input,#feedView .feedhead,#feedView .empty,
  #newsView .fb-name,#newsView .fb-caption,#newsView .fb-cap-first,#newsView .fb-actions button,
  #newsView .composer-input,#newsView .feedhead,#newsView .empty{font-family:'Mali','Noto Sans Thai',sans-serif}
  .feedhead{display:flex;align-items:center;gap:12px;max-width:600px;margin:0 auto;padding:12px 14px 4px;
    font-weight:700;font-size:1.15rem;color:#1877f2}
  .backbtn{width:38px;height:38px;border:none;background:#e4e6eb;border-radius:50%;
    font-size:1.2rem;cursor:pointer;color:#050505}
  /* feed search */
  .feedsearch{max-width:600px;margin:0 auto;padding:6px 14px 10px;position:relative}
  .feedsearch input{width:100%;padding:11px 16px 11px 40px;font-family:'Mali','Noto Sans Thai',sans-serif;
    font-size:.95rem;border:none;border-radius:999px;background:#fff;outline:none;box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .feedsearch svg{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:#65676b}
  /* feed (Facebook style) */
  .feed{max-width:600px;margin:0 auto;padding:0 0 28px;display:flex;flex-direction:column;gap:10px}
  .post{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .fb-head{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
  .fb-ava{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#1877f2;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Bai Jamjuree';font-weight:700;font-size:1.1rem}
  .fb-meta{flex:1;min-width:0}
  .fb-name{font-family:'Bai Jamjuree';font-weight:700;font-size:.97rem;color:#050505;line-height:1.2}
  .fb-sub{font-size:.76rem;color:#65676b;display:flex;align-items:center;gap:4px;margin-top:1px}
  .fb-menu{background:none;border:none;color:#65676b;font-size:1.2rem;cursor:pointer;padding:4px 8px;line-height:1}
  .fb-caption{padding:2px 14px 10px;font-size:.97rem;line-height:1.5;white-space:pre-wrap;color:#050505}
  .fb-cap-first{display:block;font-weight:700;font-size:1.04rem;color:#050505;margin-bottom:2px}
  .fb-price{display:inline-block;margin:0 14px 10px;background:#e7f3ff;color:#1877f2;font-family:'Bai Jamjuree';
    font-weight:700;font-size:1.02rem;padding:5px 12px;border-radius:8px}
  /* photo collage */
  .pg{display:grid;gap:3px;background:#fff;width:100%}
  .pg img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;background:#e4e6eb}
  .pg[data-n="1"]{grid-template-columns:1fr}
  .pg[data-n="1"] img{max-height:520px;aspect-ratio:auto}
  .pg[data-n="2"]{grid-template-columns:1fr 1fr;aspect-ratio:2/1}
  .pg[data-n="3"]{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr;aspect-ratio:3/2}
  .pg[data-n="3"] img:first-child{grid-row:span 2}
  .pg[data-n="4"]{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;aspect-ratio:1/1}
  .fb-noimg{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1877f2,#0a4da6);color:#dce9ff;font-family:'Bai Jamjuree';font-size:.95rem}
  /* composer (admin only) */
  .composer{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.12);padding:14px;margin-bottom:12px}
  .composer-title{font-family:'Mali','Noto Sans Thai',sans-serif;font-weight:600;font-size:.9rem;
    color:#1877f2;margin-bottom:10px;text-align:center}
  .composer-row{display:flex;align-items:center;gap:10px}
  .composer-input{flex:1;background:#f0f2f5;border:none;border-radius:999px;padding:11px 16px;
    text-align:left;color:#65676b;font-family:'Noto Sans Thai';font-size:.95rem;cursor:pointer}
  .composer-photo{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;padding-top:10px;
    border-top:1px solid #eceef0;color:#45bd62;font-family:'Bai Jamjuree';font-weight:600;font-size:.9rem;cursor:pointer}
  .fb-stats{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;color:#65676b;font-size:.84rem}
  .fb-stats .react{display:flex;align-items:center;gap:5px}
  .fb-actions{display:flex;border-top:1px solid #ced0d4;margin:0 8px}
  .fb-actions button{flex:1;background:none;border:none;color:#65676b;font-family:'Bai Jamjuree';font-weight:600;
    font-size:.86rem;padding:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:6px}
  .fb-actions button:hover{background:#f2f2f2}
  .fb-actions button.liked{color:#1877f2}
  .post-admin{display:flex;gap:6px;padding:8px 14px 12px}
  /* lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:80;display:none;align-items:center;justify-content:center;flex-direction:column}
  .lightbox.show{display:flex}
  .lightbox img{max-width:96vw;max-height:84vh;object-fit:contain}
  .lightbox .lbclose{position:absolute;top:18px;right:20px;background:rgba(255,255,255,.15);color:#fff;border:none;
    width:42px;height:42px;border-radius:50%;font-size:1.3rem;cursor:pointer}
  .lightbox .lbnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;
    border:none;width:46px;height:46px;border-radius:50%;font-size:1.5rem;cursor:pointer}
  .lightbox .lbprev{left:14px}.lightbox .lbnext{right:14px}
  .contactbar{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:#fff;border-top:1px solid var(--line);
    padding:12px 16px;display:flex;gap:10px;max-width:760px;margin:0 auto;
    box-shadow:0 -4px 16px rgba(22,32,43,.05);
  }
  .cbtn{flex:1;text-align:center;text-decoration:none;font-family:'Bai Jamjuree';font-weight:600;
    padding:13px;border-radius:12px;font-size:.95rem;display:flex;align-items:center;justify-content:center;gap:7px}
  .cbtn.line{background:#06c755;color:#fff}
  .cbtn.msgr{background:#0084ff;color:#fff}
  .cbtn.call{background:var(--ink);color:#fff}
  .cbtn{font-size:.86rem;padding:13px 8px}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(22,32,43,.55);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:20px;max-height:90vh;overflow-y:auto;animation:up .22s ease}
  @keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet h2{font-family:'Bai Jamjuree';font-size:1.15rem;margin-bottom:4px}
  .sheet .desc{font-size:.84rem;color:var(--ink-soft);margin-bottom:16px}
  label{display:block;font-family:'Bai Jamjuree';font-weight:500;font-size:.82rem;margin:12px 0 5px;color:var(--ink)}
  input,select,textarea{width:100%;padding:11px 13px;font-family:'Noto Sans Thai';font-size:.95rem;
    border:1.5px solid var(--line);border-radius:11px;outline:none;background:#fff}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .btn{width:100%;font-family:'Bai Jamjuree';font-weight:600;font-size:.98rem;padding:13px;border:none;
    border-radius:12px;background:var(--accent);color:#fff;cursor:pointer;margin-top:18px}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);margin-top:8px}
  .seg{display:flex;gap:8px;margin-bottom:14px;background:var(--bg);padding:4px;border-radius:12px}
  .seg button{flex:1;font-family:'Bai Jamjuree';font-weight:500;font-size:.85rem;padding:9px;border:none;border-radius:9px;background:none;cursor:pointer;color:var(--ink-soft)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .adminlist{display:flex;flex-direction:column;gap:7px;margin-top:6px}
  .err{color:#c0392b;font-size:.82rem;margin-top:8px;display:none}
  .imgrow{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}
  .thumb{width:54px;height:54px;border-radius:12px;object-fit:cover;border:1px solid var(--line)}
  .thumb.wide{width:96px;height:54px}
  .upbtn{display:inline-block;margin:0;font-family:'Bai Jamjuree';font-weight:500;font-size:.82rem;
    padding:9px 14px;border:1.5px dashed var(--accent);color:var(--accent);border-radius:10px;cursor:pointer;background:var(--accent-soft)}
</style>
</head>
<body>

<header id="appHeader">
  <div class="brand-wrap">
    <img class="logo" id="shopLogo" alt="">
    <div class="brand"><span id="shopName">ใบมิ้นท์ งานช่าง</span>
      <small id="hdrtag">อะไหล่ มือถือ</small>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;position:relative;z-index:2">
    <span id="cloudDot" title="" style="width:9px;height:9px;border-radius:50%;background:#9ca3af;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.3)"></span>
    <button class="gear" id="newsBtn" title="ข่าวสาร" onclick="switchView('news')"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
    <button class="gear" id="postsBtn" title="โพสต์สินค้า" onclick="switchView('feed')"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></button>
    <button class="gear" id="adminBtn" title="ตั้งค่า"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </div>
</header>

<div id="newsView" style="display:none">
  <div class="feedhead">
    <button class="backbtn" onclick="switchView('price')">←</button>
    <span>📢 ข่าวสาร / แจ้งเตือน</span>
  </div>
  <div class="feed" id="news"></div>
</div>

<div id="feedView" style="display:none">
  <div class="feedhead">
    <button class="backbtn" onclick="switchView('price')">←</button>
    <span>โพสต์สินค้า</span>
  </div>
  <div class="feedsearch">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
    <input id="feedSearch" placeholder="ค้นหาโพสต์ เช่น iPhone, จอ, 1200..." autocomplete="off">
  </div>
  <div class="feed" id="feed"></div>
</div>

<div id="priceView" style="display:none">
  <div class="hero">
    <div class="searchwrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <input id="search" placeholder="ค้นหารุ่น เช่น iPhone 13, A54, แบต..." autocomplete="off">
    </div>
    <div class="pricenote">
      <span>ⓘ</span><span>ราคาเป็นราคาประมาณเบื้องต้น <b>สินค้าสามารถต่อรองราคาได้</b> กดเพิ่มเพื่อนในไลน์เพื่อสอบถามและต่อรองราคาได้เลย</span>
    </div>
  </div>
  <div class="chips" id="chips"></div>
  <div class="list" id="list"></div>
</div>

<div class="contactbar">
  <a class="cbtn line" id="lineBtn" href="#">💬 ไลน์</a>
  <a class="cbtn msgr" id="msgrBtn" href="#">Ⓜ Messenger</a>
  <a class="cbtn call" id="callBtn" href="#">📞 โทร</a>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="if(event.target.id==='lightbox')closeLb()">
  <button class="lbclose" onclick="closeLb()">✕</button>
  <button class="lbnav lbprev" onclick="lbNav(-1)">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lbnav lbnext" onclick="lbNav(1)">›</button>
</div>

<!-- ADMIN OVERLAY -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script>
/* ---------- storage layer (สลับเป็น Firebase ได้ภายหลัง) ---------- */
const DB_KEY='partsPriceDB_v1';
const defaultDB={
  shop:{name:'ใบมิ้นท์ งานช่าง', tag:'อะไหล่ มือถือ', line:'0842916649', messenger:'baimint', phone:'0962264469', phone2:'0842916649', logo:'', cover:'', postAvatar:'', pass:'1234'},
  featured:['เมนบอร์ด iPhone','เมนบอร์ด Android'],
  posts:[
    {id:101,images:[],caption:'🔥 จอแท้ถอด iPhone 11-13 พร้อมส่ง งานสวยคมชัด ติดตั้งไว\nรับประกันงานติดตั้ง สนใจทักสอบถามได้เลย',price:1200,price2:2200,ts:Date.now()-3600000,likes:17},
    {id:102,images:[],caption:'แบตเตอรี่แท้ทุกรุ่น เปลี่ยนปุ๊บใช้งานยาว\nมีบริการเปลี่ยนหน้าร้าน รอรับได้เลย',price:450,price2:null,ts:Date.now()-86400000,likes:21},

  if(!d.categories) d.categories=structuredClone(defaultDB.categories);
  if(!d.products) d.products=structuredClone(defaultDB.products);
  d.posts.forEach(p=>{ if(!p.images) p.images = p.img ? [p.img] : []; delete p.img; if(typeof p.likes==='undefined') p.likes=0; });
  if(typeof d.shop.messenger==='undefined') d.shop.messenger='';
  if(typeof d.shop.phone2==='undefined') d.shop.phone2='';
  if(typeof d.shop.logo==='undefined') d.shop.logo='';

  return d;
}

const CLOUDINARY_CLOUD='snydjz6b';
const CLOUDINARY_PRESET='baimint38';
async function uploadDataUrl(dataUrl){
  const fd=new FormData();
  fd.append('file',dataUrl);
  fd.append('upload_preset',CLOUDINARY_PRESET);
  const res=await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD+'/image/upload',{method:'POST',body:fd});
  let data={}; try{data=await res.json()}catch(e){}
  if(!res.ok || !data.secure_url){
    const msg=(data&&data.error&&data.error.message)?data.error.message:('HTTP '+res.status);
    throw new Error(msg);
  }
  return data.secure_url;
}
async function uploadPendingImages(){
  for(const k of ['logo','cover','postAvatar']){
    if(db.shop[k] && db.shop[k].startsWith('data:')){
      db.shop[k]=await uploadDataUrl(db.shop[k]);
    }
  }
  for(const p of db.posts){
    if(p.images&&p.images.length){
      for(let i=0;i<p.images.length;i++){
        if(p.images[i]&&p.images[i].startsWith('data:')){
          p.images[i]=await uploadDataUrl(p.images[i]);
        }
      }
    }
  }
}
let saving=false;
function stripBase64(o){
  if(o.shop){ for(const k of ['logo','cover','postAvatar']){ if(typeof o.shop[k]==='string'&&o.shop[k].startsWith('data:')) o.shop[k]=''; } }
  if(o.posts) o.posts.forEach(p=>{ if(p.images) p.images=p.images.filter(s=>!(typeof s==='string'&&s.startsWith('data:'))); });
  return o;
}

function timeAgo(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<3600) return Math.max(1,Math.floor(d/60))+' นาทีที่แล้ว';
  if(d<86400) return Math.floor(d/3600)+' ชม.ที่แล้ว';
  if(d<604800) return Math.floor(d/86400)+' วันที่แล้ว';
  return new Date(ts).toLocaleDateString('th-TH');
}
function fullDate(ts){
  const dt=new Date(ts);
  const rel=timeAgo(ts);
  const full=dt.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'})+' '+
    dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})+' น.';
  // โพสต์ใหม่โชว์แบบ "x ชม.ที่แล้ว", โพสต์เก่าโชว์วันเวลาเต็ม
  return (Date.now()-ts < 604800000) ? rel : full;
}

}

}

function pickImg(input,kind){
  const file=input.files[0]; if(!file) return;
  const maxW = (kind==='logo'||kind==='postAvatar')?300:900;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*sc; c.height=img.height*sc;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      const data=c.toDataURL('image/jpeg',0.82);
      db.shop[kind]=data; save(); renderShop(); renderFeed(); tab('shop');
      flash('อัปเดตรูปแล้ว ✓');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

let postDraftImgs=[], editingPostId=null;
const WATERMARK_TEXT='ใบมิ้นท์ อะไหล่ งานช่าง';
function drawWatermark(ctx,w,h){
  const fs=Math.max(16,Math.round(w*0.055));
  ctx.save();
  ctx.translate(w/2,h/2);
  ctx.rotate(-Math.PI/6); // เอียงทแยง ~ -30 องศา
  ctx.font='600 '+fs+'px "Bai Jamjuree","Noto Sans Thai",sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  // เงาดำจางช่วยให้อ่านออกบนพื้นสว่าง
  ctx.fillStyle='rgba(0,0,0,0.10)';
  ctx.fillText(WATERMARK_TEXT,2,2);
  // ตัวอักษรขาวจางๆ
  ctx.fillStyle='rgba(255,255,255,0.32)';
  ctx.fillText(WATERMARK_TEXT,0,0);
  ctx.restore();
}
function resizeImg(file,maxW,q,watermark){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const sc=Math.min(1,maxW/img.width);
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
        const ctx=c.getContext('2d');
        ctx.drawImage(img,0,0,c.width,c.height);
        if(watermark) drawWatermark(ctx,c.width,c.height);
        res(c.toDataURL('image/jpeg',q));
      };
      img.onerror=rej; img.src=e.target.result;
    };
    reader.onerror=rej; reader.readAsDataURL(file);
  });
}
async function pickPostImg(input){
  const files=[...input.files]; if(!files.length) return;
  let added=0, failed=0;
  for(const f of files){
    if(postDraftImgs.length>=4){ flash('ใส่ได้สูงสุด 4 รูป'); break; }
    try{ postDraftImgs.push(await resizeImg(f,1000,0.78,true)); added++; }
    catch(e){ console.warn('resize failed:',f.name,e); failed++; }
  }
  input.value=''; renderPostThumbs();
  if(failed){ flash('อ่านรูปบางไฟล์ไม่ได้ ('+failed+') — ลองใช้ไฟล์ .jpg หรือ .png (ไฟล์ .HEIC จาก iPhone ไม่รองรับ)'); }
  else if(added){ flash('เพิ่มรูปแล้ว '+added+' รูป ✓'); }
}

function backupData(){
  try{
    const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const d=new Date();
    const stamp=d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2);
    a.href=url; a.download='baimint-backup-'+stamp+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    flash('ดาวน์โหลดไฟล์สำรองแล้ว ✓');
  }catch(e){ alert('สำรองข้อมูลไม่สำเร็จ: '+(e&&e.message?e.message:'')); }
}
function restoreData(input){
  const file=input.files&&input.files[0]; input.value='';
  if(!file) return;
  if(!confirm('กู้คืนข้อมูลจากไฟล์นี้? ข้อมูลปัจจุบันทั้งหมดจะถูกแทนที่ด้วยข้อมูลในไฟล์สำรอง')) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const obj=JSON.parse(e.target.result);
      if(!obj || (!obj.products && !obj.posts && !obj.shop)) throw new Error('ไฟล์ไม่ใช่ข้อมูลสำรองของร้าน');
      db=migrate(obj);
      save(); renderAll(); tab('shop');
      flash('กู้คืนข้อมูลสำเร็จ ✓');
    }catch(err){ alert('กู้คืนไม่สำเร็จ: '+(err&&err.message?err.message:'ไฟล์ไม่ถูกต้อง')); }
  };
  reader.onerror=()=>alert('อ่านไฟล์ไม่สำเร็จ');
  reader.readAsText(file);
}
function saveShop(){
  db.shop.name=document.getElementById('s-name').value.trim();
  db.shop.tag=document.getElementById('s-tag').value.trim();
  db.shop.line=document.getElementById('s-line').value.trim();
  db.shop.messenger=document.getElementById('s-msgr').value.trim();
  db.shop.phone=document.getElementById('s-phone').value.trim();
  db.shop.phone2=document.getElementById('s-phone2').value.trim();
  db.shop.pass=document.getElementById('s-pass').value.trim();
  save();renderShop();flash('บันทึกแล้ว ✓');
}
function flash(msg){
  const f=document.createElement('div');f.textContent=msg;
  f.style.cssText='position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#16202b;color:#fff;padding:10px 18px;border-radius:999px;font-family:Bai Jamjuree;font-size:.88rem;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.2)';
  document.body.appendChild(f);setTimeout(()=>f.remove(),1600);
}

/* ---------- init ---------- */
renderAll();
switchView('price');
initCloud();
</script>
